<!DOCTYPE html>
<!--
  Mini chatbot SIN REGISTRO - LLM7.io
  API compatible con OpenAI, nivel anonimo: sin cuenta, sin key real ("unused").
  Limite anonimo: ~30 peticiones/min. Lista de modelos: https://api.llm7.io/v1/models
  Si algun dia muere: plan B keyless = OVHcloud AI Endpoints (2 req/min, EU).
-->
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini chat · sin registro</title>
<style>
  :root{
    --bg:#0f1520;
    --panel:#161f2c;
    --line:#27344a;
    --text:#e9eef6;
    --muted:#8fa0b8;
    --accent:#f3a93c;
    --accent-text:#241a08;
    --bot:#1c2738;
    --error:#ff7a6e;
  }
  *{ box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font:15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    display:flex;
    justify-content:center;
  }
  .app{ display:flex; flex-direction:column; width:min(640px,100%); height:100dvh; }

  header{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 18px; border-bottom:1px solid var(--line);
  }
  .brand{
    display:flex; align-items:center; gap:9px;
    font:600 13px/1 ui-monospace, "Cascadia Code", Consolas, monospace;
    letter-spacing:.4px;
  }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .dot.busy{ background:var(--accent); animation:pulse .9s infinite alternate; }
  @keyframes pulse{ to{ opacity:.35; } }
  select{
    background:var(--panel); color:var(--text);
    border:1px solid var(--line); border-radius:8px; padding:7px 9px;
    font:12px ui-monospace, Consolas, monospace; cursor:pointer;
    max-width:55%;
  }

  main{ flex:1; overflow-y:auto; padding:20px 18px; display:flex; flex-direction:column; gap:12px; }
  .empty{ margin:auto; color:var(--muted); font-size:14px; text-align:center; max-width:36ch; }
  .msg{
    max-width:82%; padding:10px 14px; border-radius:14px;
    white-space:pre-wrap; overflow-wrap:anywhere;
  }
  .msg.user{
    align-self:flex-end; background:var(--accent); color:var(--accent-text);
    border-bottom-right-radius:4px;
  }
  .msg.bot{
    align-self:flex-start; background:var(--bot);
    border:1px solid var(--line); border-bottom-left-radius:4px;
  }
  .msg.error{
    align-self:flex-start; background:transparent;
    border:1px dashed var(--error); color:var(--error);
  }
  .typing{ align-self:flex-start; display:flex; gap:5px; padding:14px; }
  .typing i{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation:blink 1.2s infinite; }
  .typing i:nth-child(2){ animation-delay:.2s; }
  .typing i:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,60%,100%{ opacity:.25; } 30%{ opacity:1; } }

  footer{ display:flex; gap:10px; padding:14px 18px 18px; border-top:1px solid var(--line); }
  input{
    flex:1; background:var(--panel); color:var(--text);
    border:1px solid var(--line); border-radius:12px; padding:12px 14px; font:inherit;
  }
  input::placeholder{ color:var(--muted); }
  button{
    background:var(--accent); color:var(--accent-text);
    border:0; border-radius:12px; padding:0 20px;
    font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
  }
  button:disabled, input:disabled{ opacity:.55; cursor:default; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    .dot.busy, .typing i{ animation:none; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand"><span class="dot" id="statusDot"></span>mini-chat</div>
    <select id="modelSelect" aria-label="Modelo">
      <option value="gpt-4o-mini">GPT-4o mini · rápido</option>
      <option value="deepseek-v3-0324">DeepSeek V3 · potente</option>
      <option value="deepseek-r1-0528">DeepSeek R1 · razonamiento</option>
    </select>
  </header>

  <main id="messages">
    <p class="empty" id="emptyHint">Sin cuentas ni API keys (LLM7.io, nivel anónimo). Escribe tu primer mensaje. Límite: ~30 peticiones por minuto.</p>
  </main>

  <footer>
    <input id="input" type="text" placeholder="Escribe un mensaje..." autocomplete="off" autofocus>
    <button id="sendBtn" type="button">Enviar</button>
  </footer>

</div>

<script>
  const API_URL = 'https://api.llm7.io/v1/chat/completions';

  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('sendBtn');
  const modelEl    = document.getElementById('modelSelect');
  const dotEl      = document.getElementById('statusDot');

  const SYSTEM = 'Eres un asistente útil y conciso. Responde en el idioma del usuario.';
  const history = []; // [{role:'user'|'assistant', content:'...'}]

  function addMsg(text, cls){
    const el = document.createElement('div');
    el.className = 'msg ' + cls;
    el.textContent = text;            // textContent: sin riesgo de inyección HTML
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function addTyping(){
    const el = document.createElement('div');
    el.className = 'typing';
    el.innerHTML = '<i></i><i></i><i></i>';
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  function setBusy(busy){
    inputEl.disabled = busy;
    sendBtn.disabled = busy;
    dotEl.classList.toggle('busy', busy);
  }

  // Mantiene el payload pequeño: conserva los últimos 20 turnos,
  // empezando siempre por un mensaje de usuario.
  function trimHistory(){
    if (history.length > 20) history.splice(0, history.length - 20);
    while (history.length && history[0].role !== 'user') history.shift();
  }

  async function send(){
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;

    document.getElementById('emptyHint')?.remove();
    addMsg(text, 'user');
    history.push({ role: 'user', content: text });
    trimHistory();
    inputEl.value = '';
    setBusy(true);
    const typing = addTyping();

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer unused' // nivel anónimo: no hace falta key real
        },
        body: JSON.stringify({
          model: modelEl.value,
          messages: [ { role: 'system', content: SYSTEM }, ...history ]
        })
      });

      if (res.status === 429){
        throw new Error('Límite anónimo alcanzado (~30/min). Espera un poco y reintenta.');
      }
      if (!res.ok){
        throw new Error('El servicio respondió ' + res.status + '. Reintenta o cambia de modelo.');
      }

      const data = await res.json();
      let out = data?.choices?.[0]?.message?.content || '';
      // DeepSeek R1 puede incluir su razonamiento en <think>...</think>: lo ocultamos.
      out = out.replace(/<think>[\s\S]*?<\/think>/gi, '').trim() || '(respuesta vacía)';

      history.push({ role: 'assistant', content: out });
      typing.remove();
      addMsg(out, 'bot');
    } catch (err) {
      history.pop(); // quita el turno fallido para poder reintentar limpio
      typing.remove();
      addMsg('Error: ' + (err?.message || 'sin conexión con el servicio.'), 'error');
    } finally {
      setBusy(false);
      inputEl.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
</script>
</body>
</html>
